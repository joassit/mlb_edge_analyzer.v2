name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos). Modo actual: ingesta
# de logs crudos (bateo/pitcheo/roster) de UNA temporada sobre el histórico
# consolidado 2022-2025 (artifact historical-backtest-db-consolidated-
#2022-2025) -- se restaura a modo ingesta de temporada cuando termine este
# uso.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Año de temporada (2022/2023/2024/2025) o "selectivity" para el análisis de umbral de confianza'
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  raw-logs-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: historical-backtest-db-consolidated-2022-2025
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29166468139

      - if: ${{ inputs.season != 'selectivity' && inputs.season != 'shrinkage' }}
        run: python scratchpad_raw_logs_ingest.py ${{ inputs.season }}

      - if: ${{ inputs.season == 'selectivity' }}
        run: python scratchpad_selectivity_analysis.py

      - if: ${{ inputs.season == 'shrinkage' }}
        run: python scratchpad_shrinkage_sweep.py

      - if: ${{ always() && inputs.season != 'selectivity' && inputs.season != 'shrinkage' }}
        uses: actions/upload-artifact@v7
        with:
          name: historical-raw-logs-${{ inputs.season }}
          path: historical_backtest.db
          if-no-files-found: warn
          retention-days: 30
