name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- en ESTE uso:
# corre scratchpad_fix_pg_sequences.py (reparación de un solo uso, ver ese
# archivo) contra el Postgres real de producción (secrets.DATABASE_URL).
# Se restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (fix-pg-sequences)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  fix-pg-sequences:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scratchpad_fix_pg_sequences.py
