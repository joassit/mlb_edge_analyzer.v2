name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos). Modo actual: barrido
# de recalibración de PARK_FACTOR_WEIGHT/WEATHER_CORRECTION sobre el
# historico consolidado 2022-2025 (artifact historical-backtest-db-
# consolidated-2022-2025) -- se restaura a modo ingesta de temporada cuando
# termine este uso.
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  park-weather-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: historical-backtest-db-consolidated-2022-2025
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29166468139

      - run: python scratchpad_park_weather_sweep.py
