name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos). Este uso puntual:
# verifica si GET /teams/{id}/roster?date=YYYY-MM-DD de la MLB Stats API
# devuelve snapshots históricos reales o ignora el parámetro -- necesario
# antes de confiar en el fix propuesto para bullpen_era_as_of() (paso 2
# del plan escalonado de la auditoría de look-ahead bias). Se
# retira/reemplaza según haga falta en cada uso.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python scratchpad_verify_roster_date_param.py
