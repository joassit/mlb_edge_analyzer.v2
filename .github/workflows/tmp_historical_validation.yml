name: tmp-historical-validation

# TEMPORAL -- workflow de un solo uso para validar historical_engine con
# red real (el sandbox de desarrollo no tiene salida a statsapi.mlb.com).
# Se retira junto con los scripts scripts/tmp_workflow_*.py apenas se
# extraen los resultados del log. No se agenda (solo workflow_dispatch) y
# nunca se referencia desde daily_pipeline.yml ni desde main.py.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout feature/historical-backtesting
        uses: actions/checkout@v7
        with:
          ref: feature/historical-backtesting

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Punto 1 -- validacion real de leakage (datos en vivo 2024)
        run: python -m scripts.tmp_workflow_leakage_check

      - name: Punto 4 -- corrida real de un mes (2024-05)
        run: python -m scripts.tmp_workflow_month_validation
