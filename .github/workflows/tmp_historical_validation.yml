name: tmp-historical-validation

# TEMPORAL -- workflow de un solo uso para validar historical_engine con
# red real (el sandbox de desarrollo no tiene salida a statsapi.mlb.com).
# Se retira junto con scripts/tmp_workflow_month_validation.py apenas se
# extraen los resultados del log. No se agenda (solo push a esta rama) y
# nunca se referencia desde daily_pipeline.yml ni desde main.py.
#
# Segundo intento: el punto 1 (leakage) ya se validó con éxito en el
# primer intento -- este workflow solo reintenta el punto 4 (mes real
# 2024-05) después de corregir el bug de idempotencia en ingestion.py.

on:
  push:
    branches:
      - feature/historical-backtesting
    paths:
      - ".github/workflows/tmp_historical_validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout feature/historical-backtesting
        uses: actions/checkout@v7
        with:
          ref: feature/historical-backtesting

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Punto 4 -- corrida real de un mes (2024-05)
        run: python -m scripts.tmp_workflow_month_validation
