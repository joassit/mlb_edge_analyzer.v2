name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos) -- en ESTE uso:
# descarga el artifact de la corrida diaria de hoy (mlb_edge.db real),
# corre scratchpad_extract_report_data.py con las funciones oficiales de
# tracking/results_tracker.py y deja el JSON (gzip+base64) en el log del
# job. Se restaura al modo season-ingest al terminar, como siempre.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (extract-report-data)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  extract-report-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Artifact de la corrida daily-pipeline 29280811907 (2026-07-13,
      # workflow_dispatch en main, commit 9303875).
      - uses: actions/download-artifact@v6
        with:
          name: mlb-edge-daily-output-29280811907
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29280811907

      - run: ls -la

      - run: python scratchpad_extract_report_data.py
