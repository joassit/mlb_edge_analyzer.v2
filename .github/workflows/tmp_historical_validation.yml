name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos) -- en ESTE uso:
# descarga el artifact de la corrida diaria de hoy (mlb_edge.db real),
# corre scratchpad_extract_report_data.py con las funciones oficiales de
# tracking/results_tracker.py y deja el JSON del reporte en el log del job
# (el runner del agente no puede descargar blobs de Azure a través del
# proxy, pero sí leer logs vía la API de GitHub). Se restaura al modo
# season-ingest al terminar, como en usos anteriores.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (extract-report-data)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  extract-report-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Artifact de la corrida daily-pipeline 29199506179 (2026-07-12,
      # workflow_dispatch en main, commit 40bda82) -- contiene mlb_edge.db
      # y los CSVs del día. Se extrae en la raíz del workspace, donde el
      # DATABASE_URL por defecto (sqlite:///mlb_edge.db) lo encuentra.
      - uses: actions/download-artifact@v7
        with:
          name: mlb-edge-daily-output-29199506179
          run-id: 29199506179
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - run: ls -la

      - run: python scratchpad_extract_report_data.py
