name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- descarga el
# artifact de producción más reciente y verifica el estado REAL (vía MLB
# Stats API) de las 2 filas huérfanas encontradas en el informe del
# 2026-07-11 (07-07 y 07-10, predicción sin ActualResult). Se
# retira/reemplaza según haga falta en cada uso.
on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Nombre del artifact de producción a descargar'
        required: true
        type: string
      source_run_id:
        description: 'run_id del daily-pipeline que generó ese artifact'
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded

      - run: cp downloaded/mlb_edge.db mlb_edge.db

      - run: python scratchpad_check_orphans.py
