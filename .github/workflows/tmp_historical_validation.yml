name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- en ESTE uso:
# corre scratchpad_extract_report_data.py contra el Postgres real de
# producción (secrets.DATABASE_URL) para el reporte del 2026-07-21,
# incluyendo las 4 funciones analíticas nuevas (edge lift, ROI por
# probabilidad, descomposición, métricas rodantes -- main commit bb8ee65).
# Se restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (extract-report-data)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  extract-report-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Traer script de extracción (vive solo en feature/historical-backtesting)
        run: |
          git fetch origin feature/historical-backtesting
          git show FETCH_HEAD:scratchpad_extract_report_data.py > scratchpad_extract_report_data.py

      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scratchpad_extract_report_data.py
