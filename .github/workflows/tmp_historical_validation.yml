name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos) -- en ESTE uso:
# auditoría científica de las 4 temporadas históricas. Descarga los 4
# artifacts historical-raw-logs-{season} (las historical_backtest.db reales,
# cada una en el run que la generó) y corre scratchpad_scientific_audit.py,
# que imprime el JSON completo al log. Se restaura a modo season-ingest al
# terminar, como en usos anteriores.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (scientific-audit corre las 4)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  scientific-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: historical-raw-logs-2022
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29178320584
          path: dbs/2022

      - uses: actions/download-artifact@v6
        with:
          name: historical-raw-logs-2023
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29177971869
          path: dbs/2023

      - uses: actions/download-artifact@v6
        with:
          name: historical-raw-logs-2024
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29177975360
          path: dbs/2024

      - uses: actions/download-artifact@v6
        with:
          name: historical-raw-logs-2025
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29178323416
          path: dbs/2025

      - run: ls -laR dbs/

      - run: |
          python scratchpad_scientific_audit.py \
            2022=dbs/2022/historical_backtest.db \
            2023=dbs/2023/historical_backtest.db \
            2024=dbs/2024/historical_backtest.db \
            2025=dbs/2025/historical_backtest.db
