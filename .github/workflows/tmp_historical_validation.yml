name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- en ESTE uso:
# diagnostico de solo lectura del secret DATABASE_URL que aparecio en el
# repo entre la corrida del 2026-07-19 20:12 UTC (sin el, cache SQLite) y
# la corrida manual del 2026-07-20 17:42 UTC (con el, HAS_EXTERNAL_DB=true).
# No imprime la URL cruda, solo dialecto/tablas/conteos. Se restaura a modo
# season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (diagnose-external-db)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  diagnose-external-db:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scratchpad_diagnose_external_db.py
