name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- en ESTE uso:
# verifica las 4 funciones analíticas nuevas (edge lift, ROI por
# probabilidad, descomposición de proyección, métricas rodantes -- main
# commit bb8ee65) contra el Postgres real de producción. Checkout explícito
# de `main` (no de este branch) porque el código nuevo vive ahí. Se
# restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (verify-analytics)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Traer script de verificación (vive solo en feature/historical-backtesting)
        run: |
          git fetch origin feature/historical-backtesting
          git show FETCH_HEAD:scratchpad_verify_analytics.py > scratchpad_verify_analytics.py

      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scratchpad_verify_analytics.py
