name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos) -- descarga el
# artifact de la corrida de PRODUCCIÓN de hoy (mlb_edge.db + reports/logs)
# y extrae los picks del día para armar el PDF de predicciones. Se
# retira/reemplaza según haga falta en cada uso. Nota: sobreescribir este
# archivo NO afecta corridas ya en progreso de una dispatch anterior.
on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Nombre del artifact de producción a descargar'
        required: true
        type: string
      source_run_id:
        description: 'run_id del daily-pipeline que generó ese artifact'
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded

      - run: find downloaded -maxdepth 2

      - name: Copy mlb_edge.db to expected path
        run: cp downloaded/mlb_edge.db mlb_edge.db

      - run: python scratchpad_extract_todays_picks.py
