name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos) -- consulta rápida
# del calendario real de MLB Stats API para el 2026-07-08 al 2026-07-11
# (el egress de este entorno bloquea el acceso directo a statsapi.mlb.com,
# incluso vía WebFetch). Reemplaza temporalmente el modo "consolidate"
# mientras esa corrida (run 29139330131, ya despachada con el commit
# anterior) sigue en curso -- no la afecta, cada run usa el contenido con
# el que fue despachado. Se restaura a modo consolidate/ingesta según
# haga falta.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: python scratchpad_check_dodgers_schedule.py
