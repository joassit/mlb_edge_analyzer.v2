name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos) -- corre la ingesta
# real de una temporada mientras historical_ingest.yml/
# historical_ingest_simple.yml (los archivos permanentes) terminan de
# indexarse. Se retira/reemplaza según haga falta en cada uso.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Año de temporada a ingerir (ej. 2025)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  ingest-season:
    runs-on: ubuntu-latest
    # 340 min, no 300 -- GitHub Actions tiene un tope DURO de 6h (360 min)
    # para jobs en runners hosteados que ningún timeout-minutes puede
    # superar. Con WEATHER_CLIMATOLOGY_YEARS bajado de 5 a 3 + cache de
    # climatología dentro de la corrida, una temporada completa debería
    # entrar cómoda en ~4h30m-4h50m -- 340 deja margen real.
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python -m historical_engine.cli season ${{ inputs.season }}

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: historical-backtest-db-${{ inputs.season }}
          path: historical_backtest.db
          if-no-files-found: warn
          retention-days: 30
