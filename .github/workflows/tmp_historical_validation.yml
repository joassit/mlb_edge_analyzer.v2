name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- baja el
# artifact consolidado de las 4 temporadas (run 29166468139,
# historical-backtest-db-consolidated-2022-2025) y corre validate +
# compare por temporada, drift por motor a través de las 4, train y el
# reporte histórico final (fase 2 completa).
on:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  phase2-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: historical-backtest-db-consolidated-2022-2025
          run-id: 29166468139
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded

      - run: cp downloaded/historical_backtest.db historical_backtest.db

      - run: python scratchpad_phase2_analysis.py

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: historical-report-2022-2025
          path: historical_reports/
          if-no-files-found: warn
          retention-days: 30
