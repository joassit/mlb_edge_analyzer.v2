name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos) -- corre la ingesta
# real de una temporada (un job = una temporada, mismo patrón que 2022 y
# 2025, que sí terminaron bien). El intento anterior de meter 2023+2024
# en un solo job se canceló: 2023 sola tardó 207 min (207 vs. los ~100
# esperados) y 2024 quedó cortada por el timeout de 340 min del job
# completo. Se despachan 2023 y 2024 como corridas independientes en
# paralelo para que ninguna dependa del tiempo que tarde la otra.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Año de temporada a ingerir (ej. 2023)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  ingest-season:
    runs-on: ubuntu-latest
    # 340 min, no 300 -- tope duro de 6h (360 min) de GitHub Actions.
    # 2023 sola ya tardó 207 min con el código optimizado -- 340 sigue
    # siendo el máximo margen real disponible sin acercarse al tope.
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python -m historical_engine.cli season ${{ inputs.season }}

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: historical-backtest-db-${{ inputs.season }}
          path: historical_backtest.db
          if-no-files-found: warn
          retention-days: 30
