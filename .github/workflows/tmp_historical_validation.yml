name: tmp-historical-validation

# Uso temporal (ver historial del archivo). Modo actual: comparación
# pareada 2024 pre-fix (run_id=1) vs. post-fix sobre la base
# historical-backtest-db-2024 del run 29070769868, que conserva AMBAS
# corridas. Se restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (before-after-2024)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  before-after-2024:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: historical-backtest-db-2024
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29070769868
          path: dbs/2024old

      - run: ls -laR dbs/

      - run: python scratchpad_scientific_audit.py 2024=dbs/2024old/historical_backtest.db
