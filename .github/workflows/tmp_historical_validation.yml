name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- en ESTE uso:
# descarga el artifact de la corrida diaria mas reciente (mlb_edge.db real)
# y corre scratchpad_extract_report_data.py (funciones oficiales de
# tracking/results_tracker.py), dejando el JSON gzip+base64 en el log.
# Se restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (extract-report-data)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  extract-report-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Artifact de la corrida daily-pipeline 29604635727 (2026-07-17
      # 18:39 UTC, schedule, commit e63cc7f en main -- primer dia con
      # NEGBIN_DISPERSION=2.0).
      - uses: actions/download-artifact@v6
        with:
          name: mlb-edge-daily-output-29604635727
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29604635727

      - run: ls -la

      - run: python scratchpad_extract_report_data.py
