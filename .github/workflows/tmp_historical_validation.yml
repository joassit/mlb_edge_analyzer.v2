name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- en ESTE uso:
# corre scratchpad_extract_report_data.py contra el Postgres real de
# producción (secrets.DATABASE_URL, migrado el 2026-07-19 desde el
# mlb_edge.db legacy -- ver scripts/migrate_sqlite_to_postgres.py en main),
# usando las funciones oficiales de tracking/results_tracker.py, y deja el
# JSON gzip+base64 en el log. Se restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (extract-report-data)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  extract-report-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scratchpad_extract_report_data.py
