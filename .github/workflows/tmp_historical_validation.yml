name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- baja el
# artifact consolidado de las 4 temporadas (run 29166468139) y corre
# train() (propuesta de recalibración de NEGBIN_DISPERSION) sobre las 4,
# para confirmar si la mejora vista en 2025 (k=3) se sostiene en las
# otras 3. Se retira/reemplaza según haga falta en cada uso.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  train-all-seasons:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: historical-backtest-db-consolidated-2022-2025
          run-id: 29166468139
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded

      - run: cp downloaded/historical_backtest.db historical_backtest.db

      - run: python scratchpad_train_all_seasons.py
