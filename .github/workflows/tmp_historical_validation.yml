name: tmp-historical-validation

# TEMPORAL -- Parte A (barrido k_ip_era x k_ip_ops con IP/PA REALES,
# no la aproximación por días-desde-inicio-de-temporada) + Parte B
# (desglose de accuracy/Brier de moneyline Skellam/NB2 según si el juego
# tuvo un abridor de muestra chica). Reingiere 2024-05 completo con el
# pipeline ya corregido (~43 min de llamadas reales a la MLB Stats API).
# Se retira junto con el script apenas se extraen los resultados. Nunca
# se referencia desde daily_pipeline.yml ni main.py.

on:
  push:
    branches:
      - feature/historical-backtesting
    paths:
      - ".github/workflows/tmp_historical_validation.yml"

permissions:
  contents: read

jobs:
  realip-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout feature/historical-backtesting
        uses: actions/checkout@v7
        with:
          ref: feature/historical-backtesting

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Parte A + B -- reingesta real con IP/PA + barrido + desglose
        run: python -m scripts.tmp_workflow_realip_sweep_and_breakdown

      - name: Persistir historical_engine.db (schema con IP/PA real) como artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: historical-backtest-db-2024-05-realip
          path: historical_backtest.db
          retention-days: 14
          if-no-files-found: warn
