name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos) -- descarga el
# artifact de una ingesta histórica ya corrida y valida su contenido contra
# historical_engine/validation.py. Se retira/reemplaza según haga falta en
# cada uso.
on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Nombre del artifact a descargar (ej. historical-backtest-db-2024)'
        required: true
        type: string
      source_run_id:
        description: 'run_id del workflow que generó ese artifact'
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded

      - run: find downloaded -maxdepth 2

      - name: Copy historical_backtest.db to expected path
        run: cp downloaded/historical_backtest.db historical_backtest.db

      - run: python scratchpad_validate_2024_ingest.py
