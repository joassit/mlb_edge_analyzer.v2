name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions (evita el lag de
# indexado de workflow_dispatch para archivos nuevos). Modo actual:
# experimento de forma reciente (ventana móvil) de UNA temporada, usando el
# artifact historical-raw-logs-{season} de esa temporada (cada uno vive en
# el run que lo generó, ver el mapeo abajo) -- se restaura a modo ingesta
# de temporada cuando termine este uso.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Año de temporada (2022/2023/2024/2025)'
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  recent-form-experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - id: artifact-run
        run: |
          case "${{ inputs.season }}" in
            2022) echo "run_id=29178320584" >> "$GITHUB_OUTPUT" ;;
            2023) echo "run_id=29177971869" >> "$GITHUB_OUTPUT" ;;
            2024) echo "run_id=29177975360" >> "$GITHUB_OUTPUT" ;;
            2025) echo "run_id=29178323416" >> "$GITHUB_OUTPUT" ;;
            *) echo "temporada no soportada: ${{ inputs.season }}" >&2; exit 1 ;;
          esac

      - uses: actions/download-artifact@v6
        with:
          name: historical-raw-logs-${{ inputs.season }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.artifact-run.outputs.run_id }}

      - run: python scratchpad_recent_form_experiment.py ${{ inputs.season }}
