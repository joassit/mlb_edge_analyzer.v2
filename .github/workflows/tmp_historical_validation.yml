name: tmp-historical-validation

# TEMPORAL -- reconcilia la contradicción Pearson≈0 en margen vs. accuracy
# 58.4% de moneyline (mayo 2024). Reingiere el mes (la DB de la corrida
# anterior no se persistió) y esta vez SÍ sube historical_engine.db como
# artifact, para que un chequeo adicional no requiera reingerir de nuevo.
# Se retira junto con scripts/tmp_workflow_month_diagnostics.py apenas se
# extraen los resultados. Nunca se referencia desde daily_pipeline.yml ni
# desde main.py.

on:
  push:
    branches:
      - feature/historical-backtesting
    paths:
      - ".github/workflows/tmp_historical_validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout feature/historical-backtesting
        uses: actions/checkout@v7
        with:
          ref: feature/historical-backtesting

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reconciliacion -- baseline ingenuo, spot-check de signo, %% favorito local
        run: python -m scripts.tmp_workflow_month_diagnostics

      - name: Persistir historical_engine.db como artifact (para no reingerir de nuevo)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: historical-backtest-db-2024-05
          path: historical_backtest.db
          retention-days: 14
          if-no-files-found: warn
