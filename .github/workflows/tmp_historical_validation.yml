name: tmp-historical-validation

# Uso temporal (ver historial del archivo). Modo actual: pareo 2024
# pre-fix (artifact del run 29049812686, ingesta original) vs. post-fix
# (artifact del run 29070769868, re-ingesta con los 3 fixes), juego por
# juego. Se restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (pair-2024)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  pair-2024:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v6
        with:
          name: historical-backtest-db-2024
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29049812686
          path: dbs/2024pre

      - uses: actions/download-artifact@v6
        with:
          name: historical-backtest-db-2024
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29070769868
          path: dbs/2024post

      - run: ls -laR dbs/

      - run: python scratchpad_scientific_audit.py "pair2024=dbs/2024pre/historical_backtest.db:dbs/2024post/historical_backtest.db"
