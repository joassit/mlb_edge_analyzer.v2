name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- en ESTE uso:
# descarga el artifact de la corrida diaria mas reciente (mlb_edge.db real),
# corre scripts/export_data.py contra ella (backup CSV/JSON + integrity
# report de las 5 tablas de produccion) y commitea el resultado a ESTA
# rama -- asi el backup queda durable en el historial de git, sin
# depender de actions/cache (evictable) ni del artifact (30 dias).
# Se restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (backup-legacy-data)'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  backup-legacy-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Artifact de la corrida daily-pipeline 29655363367 (2026-07-18
      # 18:11 UTC, schedule, commit 79a01ca en main).
      - uses: actions/download-artifact@v6
        with:
          name: mlb-edge-daily-output-29655363367
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29655363367

      - run: ls -la

      - name: Backup + integrity check (scripts/export_data.py)
        run: |
          python -m scripts.export_data \
            --database-url "sqlite:///mlb_edge.db" \
            --output-dir "migration_backups/legacy_20260718" \
            --as-of "2026-07-18"

      - name: Mostrar integrity_report.json
        run: cat migration_backups/legacy_20260718/integrity_report.json

      - name: Commitear el backup a esta rama
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add migration_backups/legacy_20260718
          git diff --cached --quiet && echo "nada que commitear" || git commit -m "backup: legacy mlb_edge.db al 2026-07-18 (run 29655363367)"
          git push origin HEAD:feature/historical-backtesting
