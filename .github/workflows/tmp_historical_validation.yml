name: tmp-historical-validation

# Uso temporal de un path ya registrado en GitHub Actions -- en ESTE uso:
# descarga el artifact de la corrida diaria mas reciente (mlb_edge.db real)
# y corre scratchpad_investigate_orphans.py, que consulta la MLB Stats API
# real (con acceso de red que el sandbox del agente no tiene) para
# diagnosticar la causa raiz de las filas huerfanas documentadas en los
# informes recientes. Se restaura a modo season-ingest al terminar.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Ignorado en este modo (investigate-orphans)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  investigate-orphans:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Artifact de la corrida daily-pipeline 29695076371 (2026-07-19
      # 16:32 UTC, workflow_dispatch manual, commit 0c7b704 en main --
      # el mlb_edge.db mas reciente disponible).
      - uses: actions/download-artifact@v6
        with:
          name: mlb-edge-daily-output-29695076371
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29695076371

      - run: ls -la

      - run: python scratchpad_investigate_orphans.py
