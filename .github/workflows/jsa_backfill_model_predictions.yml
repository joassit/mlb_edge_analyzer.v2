name: jsa-backfill-model-predictions

# Persiste, por juego, la probabilidad de que gane el local segun
# jsa_evidence_engine + los 3 modelos legado ya benchmarkeados por
# jsa_historical_validate_direct.yml (historical_model_prediction) --
# nunca reimplementa logica, reusa exactamente lo que ya usa
# benchmark_season(). Mismo patron direct-contra-base-unificada que ese
# workflow: sin red, escribe (idempotente via upsert) contra
# JSA_HISTORICAL_DATABASE_URL. Pensado para exponer el DATO (no el
# codigo) al proyecto hermano JSA_V2_PROJECT via su rol de Postgres de
# solo lectura -- ver jsa/docs/ROADMAP.md para el GRANT SELECT pendiente
# sobre esta tabla.
on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Temporadas a backfillear, separadas por coma (ej. 2022,2023,2024,2025,2026)'
        required: true
        type: string
        default: '2022,2023,2024,2025,2026'

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r jsa/requirements.txt

      - name: Run backfill-model-predictions
        env:
          JSA_HISTORICAL_DATABASE_URL_SECRET: ${{ secrets.JSA_HISTORICAL_DATABASE_URL }}
        run: |
          if [ -z "$JSA_HISTORICAL_DATABASE_URL_SECRET" ]; then
            echo "JSA_HISTORICAL_DATABASE_URL no esta configurado -- este workflow requiere una base historica ya unificada." >&2
            exit 1
          fi
          IFS=',' read -ra SEASON_ARGS <<< "${{ inputs.seasons }}"
          SEASON_FLAGS=()
          for season in "${SEASON_ARGS[@]}"; do
            SEASON_FLAGS+=(--season "$season")
          done
          python -m jsa.historical.cli backfill-model-predictions \
            --db "$JSA_HISTORICAL_DATABASE_URL_SECRET" \
            "${SEASON_FLAGS[@]}" \
            --out jsa_backfill_model_predictions_result.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jsa-backfill-model-predictions-${{ github.run_id }}
          path: jsa_backfill_model_predictions_result.json
          if-no-files-found: warn
          retention-days: 30
