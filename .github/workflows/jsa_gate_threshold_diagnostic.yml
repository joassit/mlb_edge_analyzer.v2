name: jsa-gate-threshold-diagnostic

# One-off: diagnostico report-only motivado por gate-threshold-sweep
# rechazando ambos mercados moneyline (production_thresholds=null,
# n_games_passing_gate=0 incluso con el grid mas laxo). Nunca escribe en
# ningun registry -- solo describe la distribucion real de
# cri_score/uncertainty_index/probabilidad calibrada sobre las temporadas
# ya ingeridas, para decidir si el grid del sweep esta mal calibrado o si
# la ingesta historica produce CRI/incertidumbre sistematicamente
# distintos a los que produccion en vivo ve. No requiere JSA_DATABASE_URL
# -- corre 100% sobre JSA_HISTORICAL_DATABASE_URL ya poblado.
on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Temporadas a incluir, separadas por coma (ej. 2022,2023,2024,2025,2026)'
        required: true
        type: string
        default: '2022,2023,2024,2025,2026'

permissions:
  contents: read

jobs:
  gate-threshold-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r jsa/requirements.txt

      - name: Run gate-threshold-diagnostic
        env:
          JSA_HISTORICAL_DATABASE_URL_SECRET: ${{ secrets.JSA_HISTORICAL_DATABASE_URL }}
        run: |
          if [ -z "$JSA_HISTORICAL_DATABASE_URL_SECRET" ]; then
            echo "JSA_HISTORICAL_DATABASE_URL no esta configurado -- este workflow requiere una base historica ya unificada." >&2
            exit 1
          fi
          IFS=',' read -ra SEASON_ARGS <<< "${{ inputs.seasons }}"
          SEASON_FLAGS=()
          for season in "${SEASON_ARGS[@]}"; do
            SEASON_FLAGS+=(--season "$season")
          done
          python -m jsa.historical.cli gate-threshold-diagnostic \
            --db "$JSA_HISTORICAL_DATABASE_URL_SECRET" \
            "${SEASON_FLAGS[@]}" \
            --out jsa_gate_threshold_diagnostic_result.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jsa-gate-threshold-diagnostic-${{ github.run_id }}
          path: jsa_gate_threshold_diagnostic_result.json
          if-no-files-found: warn
          retention-days: 30
