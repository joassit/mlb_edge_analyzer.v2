name: historical-ingest-simple

on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Año de temporada a ingerir (ej. 2024)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  ingest-season:
    runs-on: ubuntu-latest
    # 340, no 300 -- ver historical_ingest.yml para el porqué (tope duro
    # de 6h de GitHub Actions + costo real del fix de climatología).
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python -m historical_engine.cli season ${{ inputs.season }}

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: historical-backtest-db-${{ inputs.season }}
          path: historical_backtest.db
          if-no-files-found: warn
          retention-days: 30
