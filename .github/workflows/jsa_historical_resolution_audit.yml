name: jsa-historical-resolution-audit

# One-off, solo lectura: segunda generacion de la auditoria discriminativa
# -- sensibilidad de la resolucion de discretizacion (-2..2 vs mas
# niveles vs percentiles vs z-score vs continuo puro) para starter/
# bullpen/offense, y alternativas offline a team_quality (Elo,
# Pythagorean Expectation) calculadas 100% a partir de historical_game ya
# ingerido (nunca golpea la API de MLB). No escribe en calibration_registry
# ni en ninguna otra tabla -- solo lee JSA_HISTORICAL_DATABASE_URL y
# devuelve el resultado como JSON.
on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Temporadas a incluir, separadas por coma (ej. 2022,2023,2024,2025,2026)'
        required: true
        type: string
        default: '2022,2023,2024,2025,2026'

permissions:
  contents: read

jobs:
  resolution-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r jsa/requirements.txt

      - name: Run resolution-audit
        env:
          JSA_HISTORICAL_DATABASE_URL_SECRET: ${{ secrets.JSA_HISTORICAL_DATABASE_URL }}
        run: |
          if [ -z "$JSA_HISTORICAL_DATABASE_URL_SECRET" ]; then
            echo "JSA_HISTORICAL_DATABASE_URL no esta configurado -- este workflow requiere una base historica ya unificada." >&2
            exit 1
          fi
          IFS=',' read -ra SEASON_ARGS <<< "${{ inputs.seasons }}"
          SEASON_FLAGS=()
          for season in "${SEASON_ARGS[@]}"; do
            SEASON_FLAGS+=(--season "$season")
          done
          python -m jsa.historical.cli resolution-audit \
            --db "$JSA_HISTORICAL_DATABASE_URL_SECRET" \
            "${SEASON_FLAGS[@]}" \
            --out jsa_resolution_audit_result.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jsa-historical-resolution-audit-${{ github.run_id }}
          path: jsa_resolution_audit_result.json
          if-no-files-found: warn
          retention-days: 30
