name: jsa-game-flow-candidate-audit

# One-off, solo lectura: comparacion LOSO de las 2 hipotesis del Game Flow
# Engine v1.0 Etapa 1 (GF1 durabilidad del abridor, GF2 dependencia de
# bullpen -- ver jsa/docs/game_flow_design.md) contra el pilar de
# produccion correspondiente (starter/bullpen). A diferencia de Statcast,
# NO requiere ninguna ingesta nueva -- ambas hipotesis se derivan de
# campos ya persistidos en historical_snapshot (home/away_starter_
# projected_ip, home/away_bullpen_era). Nunca golpea la API de MLB, nunca
# modifica ningun pilar ni registry -- solo lee JSA_HISTORICAL_DATABASE_URL
# y devuelve el resultado como JSON.
on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Temporadas a incluir, separadas por coma (ej. 2022,2023,2024,2025,2026)'
        required: true
        type: string
        default: '2022,2023,2024,2025,2026'

permissions:
  contents: read

jobs:
  game-flow-candidate-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r jsa/requirements.txt

      - name: Run game-flow-candidate-audit
        env:
          JSA_HISTORICAL_DATABASE_URL_SECRET: ${{ secrets.JSA_HISTORICAL_DATABASE_URL }}
        run: |
          if [ -z "$JSA_HISTORICAL_DATABASE_URL_SECRET" ]; then
            echo "JSA_HISTORICAL_DATABASE_URL no esta configurado -- este workflow requiere una base historica ya unificada." >&2
            exit 1
          fi
          IFS=',' read -ra SEASON_ARGS <<< "${{ inputs.seasons }}"
          SEASON_FLAGS=()
          for season in "${SEASON_ARGS[@]}"; do
            SEASON_FLAGS+=(--season "$season")
          done
          python -m jsa.historical.cli game-flow-candidate-audit \
            --db "$JSA_HISTORICAL_DATABASE_URL_SECRET" \
            "${SEASON_FLAGS[@]}" \
            --out jsa_game_flow_candidate_audit_result.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jsa-game-flow-candidate-audit-${{ github.run_id }}
          path: jsa_game_flow_candidate_audit_result.json
          if-no-files-found: warn
          retention-days: 30
