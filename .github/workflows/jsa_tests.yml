name: jsa-tests

on:
  push:
    branches: ["**"]
    paths:
      - "jsa/**"
      - ".github/workflows/jsa_tests.yml"
  pull_request:
    paths:
      - "jsa/**"
      - ".github/workflows/jsa_tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r jsa/requirements.txt
      - name: Run tests
        working-directory: jsa
        run: pytest -q
