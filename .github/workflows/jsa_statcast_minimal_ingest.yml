name: jsa-statcast-minimal-ingest

# Etapa 2 (ingesta) del plan de Statcast acordado con el usuario -- ALCANCE
# DELIBERADAMENTE MINIMO (ver jsa/docs/statcast_integration_design.md):
# solo 2 campos crudos por evento de bateo (launch_speed +
# estimated_woba_using_speedangle), liga completa por ventana de fecha
# (nunca por equipo -- mas barato, ver spike de factibilidad). Nunca toca
# ningun pilar ni GameSnapshot -- persiste en su propia tabla
# `historical_statcast_event`, aislada.
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Temporada a ingerir (2022-2026)'
        required: true
        type: string
      force:
        description: 'Borrar eventos de Statcast ya ingeridos de esta temporada antes de re-ingerir'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  statcast-minimal-ingest:
    runs-on: ubuntu-latest
    # Bulk-pull liga completa por ventana de 30 dias -- bastante mas
    # barato que el patron de Trend (por equipo, por juego), pero el
    # spike de factibilidad midio ~9s por ventana de 1 semana -- 180 min
    # deja margen real sin acercarse al tope de 6h de la plataforma.
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r jsa/requirements.txt

      - name: Ingest Statcast season (minimal)
        env:
          JSA_HISTORICAL_DATABASE_URL_SECRET: ${{ secrets.JSA_HISTORICAL_DATABASE_URL }}
        run: |
          if [ -n "$JSA_HISTORICAL_DATABASE_URL_SECRET" ]; then
            export JSA_HISTORICAL_DATABASE_URL="$JSA_HISTORICAL_DATABASE_URL_SECRET"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            python -m jsa.historical.cli ingest-statcast ${{ inputs.season }} --force --out jsa_statcast_ingest_cost_summary.json
          else
            python -m jsa.historical.cli ingest-statcast ${{ inputs.season }} --out jsa_statcast_ingest_cost_summary.json
          fi

      - name: Upload cost summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jsa-statcast-ingest-cost-${{ inputs.season }}-${{ github.run_id }}
          path: jsa_statcast_ingest_cost_summary.json
          if-no-files-found: warn
          retention-days: 30
