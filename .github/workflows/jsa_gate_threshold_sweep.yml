name: jsa-gate-threshold-sweep

# One-off: Fase 6 (Seccion 10.3/10.4) -- Gate Threshold Sweep con nested
# walk-forward real sobre moneyline_home/moneyline_away (los unicos 2
# mercados con probabilidad calibrada propia -- run_line/totales quedan
# fuera, sin modelo detras). No requiere ninguna ingesta nueva -- corre
# 100% sobre JSA_HISTORICAL_DATABASE_URL ya poblado.
# `sync_to_registries=false` por default: solo reporta. En `true`, ADEMAS
# escribe una fila nueva por mercado en gate_registry (JSA_DATABASE_URL)
# con los thresholds de produccion y el status real
# (validated_70/validated_below_70/rejected_insufficient_data) --
# cambio de comportamiento real, nunca automatico sin decidirlo
# explicitamente en el dispatch.
on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Temporadas a incluir, separadas por coma (ej. 2022,2023,2024,2025,2026)'
        required: true
        type: string
        default: '2022,2023,2024,2025,2026'
      sync_to_registries:
        description: 'Ademas de reportar, escribir una fila nueva en gate_registry por mercado (moneyline_home/moneyline_away) segun el resultado'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  gate-threshold-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r jsa/requirements.txt

      - name: Run gate-threshold-sweep
        env:
          JSA_HISTORICAL_DATABASE_URL_SECRET: ${{ secrets.JSA_HISTORICAL_DATABASE_URL }}
          JSA_DATABASE_URL_SECRET: ${{ secrets.JSA_DATABASE_URL }}
        run: |
          if [ -z "$JSA_HISTORICAL_DATABASE_URL_SECRET" ]; then
            echo "JSA_HISTORICAL_DATABASE_URL no esta configurado -- este workflow requiere una base historica ya unificada." >&2
            exit 1
          fi
          IFS=',' read -ra SEASON_ARGS <<< "${{ inputs.seasons }}"
          SEASON_FLAGS=()
          for season in "${SEASON_ARGS[@]}"; do
            SEASON_FLAGS+=(--season "$season")
          done
          SYNC_FLAGS=()
          if [ "${{ inputs.sync_to_registries }}" = "true" ]; then
            if [ -z "$JSA_DATABASE_URL_SECRET" ]; then
              echo "JSA_DATABASE_URL no esta configurado -- gate_registry vive ahi, no en la base historica." >&2
              exit 1
            fi
            SYNC_FLAGS=(--sync-to-registries --registries-db "$JSA_DATABASE_URL_SECRET")
          fi
          python -m jsa.historical.cli gate-threshold-sweep \
            --db "$JSA_HISTORICAL_DATABASE_URL_SECRET" \
            "${SEASON_FLAGS[@]}" \
            "${SYNC_FLAGS[@]}" \
            --out jsa_gate_threshold_sweep_result.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jsa-gate-threshold-sweep-${{ github.run_id }}
          path: jsa_gate_threshold_sweep_result.json
          if-no-files-found: warn
          retention-days: 30
